<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Censorscan</title>
  <link rel="stylesheet" href="style.css">
  <script defer src="script.js"></script>
</head>
<body>
  <div id="root">
    <h2 id="title">Censorscan</h1>
    <h1 id="censor-status">Запустите проверку</h1>
    <div id="checkers">
      <div class="site" id="telegram.org">
        <p class="site-name">Telegram</p>
        <div class="site-status"></div>
      </div>
      <div class="site" id="youtube.com">
        <p class="site-name">Youtube</p>
        <div class="site-status"></div>
      </div>
      <div class="site" id="google.com">
        <p class="site-name">Google</p>
        <div class="site-status"></div>
      </div>
      <div class="site" id="example.com">
        <p class="site-name">example.com</p>
        <div class="site-status"></div>
      </div>
      <div class="site" id="yandex.ru">
        <p class="site-name">Яндекс</p>
        <div class="site-status"></div>
      </div>
      <div class="site" id="vk.com">
        <p class="site-name">ВКонтакте</p>
        <div class="site-status"></div>
      </div>
    </div>
    <button id="check-button">Проверить</button>
  </div>
</body>
</html>
